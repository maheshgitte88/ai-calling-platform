services:
  backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    ports:
      - "4040:4040"
    env_file:
      - ./backend-node/.env
    networks:
      - default
      - livekit-net

  interview-agent:
    build:
      context: ./agent-python
      dockerfile: Dockerfile
    command: ["python", "interview_agent_entrypoint.py", "dev"]
    env_file:
      - ./agent-python/.env
    networks:
      - default
      - livekit-net

  interview-evaluator:
    build:
      context: ./agent-python
      dockerfile: Dockerfile
    command: ["python", "evaluator_app.py"]
    env_file:
      - ./agent-python/.env
    expose:
      - "8090"
    networks:
      - default
      - livekit-net

  dashboard:
    build:
      context: ./dashboard-react
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  livekit-net:
    external: true
    name: livekit-stack_livekit-net
